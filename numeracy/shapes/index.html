<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Shapes Matching Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#f7f7f7;
}

.slide{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
display:none;
}

.slide.active{
display:flex;
}

/* ---------------- SLIDE 1 ---------------- */

#slide1{
background:white;
justify-content:center;
align-items:center;
flex-direction:column;
}

#slide1 img{
width:min(60vw,300px);
max-width:300px;
}

.tapText{
margin-top:20px;
font-size:24px;
font-weight:bold;
color:#444;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:.3;}
}

/* ---------------- SLIDE 2 ---------------- */

#slide2{
background:#f3f3f3;
flex-direction:column;
align-items:center;
padding:10px;
background-image:
radial-gradient(#000 2px, transparent 2px),
radial-gradient(#f9d423 3px, transparent 3px);
background-size:120px 120px,180px 180px;
}

.instruction{
font-size:clamp(16px,2vw,28px);
font-weight:bold;
text-align:center;
margin-top:10px;
margin-bottom:10px;
color:#333;
}

.gameArea{
position:relative;
width:100%;
height:calc(100% - 70px);
display:flex;
justify-content:center;
align-items:center;
}

.columns{
width:min(900px,95vw);
display:flex;
justify-content:center;
gap:80px;
position:relative;
}

.column{
display:flex;
flex-direction:column;
gap:15px;
}

.card{
width:min(24vw,160px);
height:min(24vw,160px);
max-width:160px;
max-height:160px;
background:white;
border:5px solid;
border-radius:18px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.shapeCard:nth-child(1){border-color:#ff6b6b;}
.shapeCard:nth-child(2){border-color:#4ecdc4;}
.shapeCard:nth-child(3){border-color:#f7b731;}
.shapeCard:nth-child(4){border-color:#6c5ce7;}

.objectCard:nth-child(1){border-color:#ff9ff3;}
.objectCard:nth-child(2){border-color:#54a0ff;}
.objectCard:nth-child(3){border-color:#1dd1a1;}
.objectCard:nth-child(4){border-color:#f368e0;}

.card img{
width:70%;
height:70%;
object-fit:contain;
pointer-events:none;
}

.label{
margin-top:5px;
font-size:18px;
font-weight:bold;
color:#333;
text-transform:lowercase;
}

.selected{
transform:scale(1.08);
}

.tick,
.cross{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
z-index:1000;
display:none;
pointer-events:none;
}

.tick{
color:#2ecc71;
}

.cross{
color:#e74c3c;
}

svg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

/* ---------------- SLIDE 3 ---------------- */

#slide3{
background:white;
justify-content:center;
align-items:center;
overflow:hidden;
flex-direction:column;
}

.amazing{
font-size:clamp(40px,8vw,80px);
font-weight:bold;
color:#ff6b6b;
z-index:5;
}

.sub{
font-size:clamp(20px,4vw,35px);
margin-top:10px;
color:#555;
z-index:5;
}

.rain{
position:absolute;
font-size:40px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-120px) rotate(0deg);
}
100%{
transform:translateY(120vh) rotate(360deg);
}
}

@media(max-width:768px){

.columns{
gap:25px;
}

.card{
width:120px;
height:120px;
}

.label{
font-size:14px;
}

}

</style>
</head>
<body>

<!-- AUDIO -->

<audio id="clap" src="assets/clap.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<!-- SLIDE 1 -->

<div class="slide active" id="slide1">

<img src="assets/innovine-logo.png">

<div class="tapText">
Tap Anywhere To Start
</div>

</div>

<!-- SLIDE 2 -->

<div class="slide" id="slide2">

<div class="instruction">
Identify the Shape and match it to the correct object.
</div>

<div class="gameArea">

<svg id="lines"></svg>

<div class="columns">

<div class="column">

<div class="card shapeCard"
data-shape="triangle">

<img src="assets/triangle.png">

<div class="label">
triangle
</div>

</div>

<div class="card shapeCard"
data-shape="square">

<img src="assets/square.png">

<div class="label">
square
</div>

</div>

<div class="card shapeCard"
data-shape="circle">

<img src="assets/circle.png">

<div class="label">
circle
</div>

</div>

<div class="card shapeCard"
data-shape="rectangle">

<img src="assets/rectangle.png">

<div class="label">
rectangle
</div>

</div>

</div>

<div class="column">

<div class="card objectCard"
data-object="nachos">

<img src="assets/nachos.png">

</div>

<div class="card objectCard"
data-object="clock">

<img src="assets/clock.png">

</div>

<div class="card objectCard"
data-object="donut">

<img src="assets/donut.png">

</div>

<div class="card objectCard"
data-object="laptop">

<img src="assets/laptop.png">

</div>

</div>

</div>

</div>

</div>

<!-- SLIDE 3 -->

<div class="slide" id="slide3">

<div class="amazing">
Amazing!
</div>

<div class="sub">
Great Job!
</div>

</div>

<div class="tick" id="tick">✔</div>
<div class="cross" id="cross">✖</div>

<script>

const slide1=document.getElementById("slide1");
const slide2=document.getElementById("slide2");
const slide3=document.getElementById("slide3");

slide1.addEventListener("click",()=>{

slide1.classList.remove("active");
slide2.classList.add("active");

});

const answers={
triangle:"nachos",
square:"clock",
circle:"donut",
rectangle:"laptop"
};

let selectedShape=null;
let completed=0;

const clap=document.getElementById("clap");
const wrong=document.getElementById("wrong");

const tick=document.getElementById("tick");
const cross=document.getElementById("cross");

const svg=document.getElementById("lines");

document.querySelectorAll(".shapeCard").forEach(card=>{

card.addEventListener("click",()=>{

if(card.dataset.done) return;

document.querySelectorAll(".shapeCard")
.forEach(c=>c.classList.remove("selected"));

selectedShape=card;

card.classList.add("selected");

});

});

document.querySelectorAll(".objectCard").forEach(card=>{

card.addEventListener("click",()=>{

if(!selectedShape) return;

const shape=selectedShape.dataset.shape;
const object=card.dataset.object;

if(answers[shape]===object){

showTick();

clap.currentTime=0;
clap.play();

drawLine(selectedShape,card);

selectedShape.dataset.done="yes";
card.dataset.done="yes";

selectedShape.style.opacity=".6";
card.style.opacity=".6";

selectedShape.classList.remove("selected");
selectedShape=null;

completed++;

if(completed===4){

setTimeout(()=>{

slide2.classList.remove("active");
slide3.classList.add("active");

createRain();

},1200);

}

}else{

showCross();

wrong.currentTime=0;
wrong.play();

}

});

});

function showTick(){

tick.style.display="block";

setTimeout(()=>{
tick.style.display="none";
},700);

}

function showCross(){

cross.style.display="block";

setTimeout(()=>{
cross.style.display="none";
},700);

}

function drawLine(start,end){

const svgRect=svg.getBoundingClientRect();
const r1=start.getBoundingClientRect();
const r2=end.getBoundingClientRect();

const x1=r1.right-svgRect.left;
const y1=r1.top+r1.height/2-svgRect.top;

const x2=r2.left-svgRect.left;
const y2=r2.top+r2.height/2-svgRect.top;

const line=document.createElementNS(
"http://www.w3.org/2000/svg",
"line"
);

line.setAttribute("x1",x1);
line.setAttribute("y1",y1);
line.setAttribute("x2",x2);
line.setAttribute("y2",y2);
line.setAttribute("stroke","#27ae60");
line.setAttribute("stroke-width","6");
line.setAttribute("stroke-linecap","round");

svg.appendChild(line);

}

function createRain(){

const shapes=[
"▲","■","●","★","◆","⬟"
];

for(let i=0;i<40;i++){

const s=document.createElement("div");

s.className="rain";
s.innerHTML=shapes[Math.floor(Math.random()*shapes.length)];

s.style.left=Math.random()*100+"vw";
s.style.animationDuration=
(3+Math.random()*4)+"s";

s.style.animationDelay=
Math.random()*2+"s";

slide3.appendChild(s);

}

}

</script>

</body>
</html>
