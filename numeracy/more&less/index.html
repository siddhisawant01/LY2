<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>More & Less Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Arial Rounded MT Bold', Arial, sans-serif;
background:#fff;
}

.game-container{
width:100%;
height:100vh;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
background:
linear-gradient(rgba(255,255,255,0.18),rgba(255,255,255,0.18)),
url('https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=1200&auto=format&fit=crop');
background-size:cover;
background-position:center;
}

.slide.active{
display:flex;
}

.logo{
max-width:320px;
width:80%;
height:auto;
}

.instruction{
font-size:clamp(22px,4vw,42px);
font-weight:bold;
text-align:center;
color:#ff4d6d;
margin-bottom:20px;
line-height:1.3;
text-shadow:2px 2px 4px rgba(255,255,255,.7);
}

.options{
width:100%;
max-width:1100px;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
flex-wrap:nowrap;
}

.card{
width:45%;
max-width:420px;
height:58vh;
max-height:450px;
min-height:240px;
background:white;
border-radius:30px;
padding:12px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:.25s;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.card:nth-child(1){
border:8px solid #ff66c4;
}

.card:nth-child(2){
border:8px solid #00c2ff;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:100%;
object-fit:contain;
}

.feedback{
position:absolute;
font-size:120px;
font-weight:bold;
display:none;
z-index:999;
animation:pop .5s ease;
}

.tick{
color:#00c853;
}

.cross{
color:#ff1744;
}

@keyframes pop{
0%{
transform:scale(.2);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

.next-btn{
position:absolute;
bottom:20px;
right:20px;
padding:14px 28px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:50px;
background:#ff9800;
color:white;
display:none;
cursor:pointer;
}

.final-message{
font-size:clamp(40px,8vw,90px);
font-weight:bold;
color:#ff5722;
text-align:center;
text-shadow:2px 2px 10px white;
}

.confetti{
position:absolute;
width:14px;
height:14px;
border-radius:50%;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(720deg);
}
}

@media(max-width:768px){

.options{
gap:10px;
}

.card{
width:48%;
height:45vh;
border-width:6px;
}

.feedback{
font-size:90px;
}

.instruction{
font-size:26px;
}
}

</style>
</head>
<body>

<div class="game-container">

<!-- Slide 1 -->

<div class="slide active" id="slide0" style="background:white;">
<img src="assets/innovine-logo.png" class="logo">
</div>

<!-- Slide 2 -->

<div class="slide" id="slide1">
<div class="instruction">Identify the basket having more fruits</div>

<div class="options">
<div class="card" onclick="checkAnswer(this,true)">
<img src="assets/morefruits.png">
</div>

<div class="card" onclick="checkAnswer(this,false)">
<img src="assets/lessfruits.png">
</div>
</div>
</div>

<!-- Slide 3 -->

<div class="slide" id="slide2">
<div class="instruction">Identify the fish tank having less fishes</div>

<div class="options">
<div class="card" onclick="checkAnswer(this,true)">
<img src="assets/lessfish.png">
</div>

<div class="card" onclick="checkAnswer(this,false)">
<img src="assets/morefish.png">
</div>
</div>
</div>

<!-- Slide 4 -->

<div class="slide" id="slide3">
<div class="instruction">Identify the tree having more mangoes</div>

<div class="options">
<div class="card" onclick="checkAnswer(this,true)">
<img src="assets/moremangoes.png">
</div>

<div class="card" onclick="checkAnswer(this,false)">
<img src="assets/lessmangoes.png">
</div>
</div>
</div>

<!-- Slide 5 -->

<div class="slide" id="slide4">
<div class="instruction">Identify the cup having less ice-cream</div>

<div class="options">
<div class="card" onclick="checkAnswer(this,true)">
<img src="assets/lessicecream.png">
</div>

<div class="card" onclick="checkAnswer(this,false)">
<img src="assets/moreicecream.png">
</div>
</div>
</div>

<!-- Slide 6 -->

<div class="slide" id="slide5">
<div class="instruction">Identify the jar having more candies</div>

<div class="options">
<div class="card" onclick="checkAnswer(this,true)">
<img src="assets/morecandies.png">
</div>

<div class="card" onclick="checkAnswer(this,false)">
<img src="assets/lesscandies.png">
</div>
</div>
</div>

<!-- Slide 7 -->

<div class="slide" id="slide6">
<div class="final-message">
🎉 Amazing! 🎉
</div>
</div>

<div class="feedback tick" id="tick">✓</div>
<div class="feedback cross" id="cross">✗</div>

<button class="next-btn" id="nextBtn" onclick="nextSlide()">
Next →
</button>

<audio id="correctSound" preload="auto">
<source src="assets/clap.mp3" type="audio/mpeg">
</audio>

<audio id="wrongSound" preload="auto">
<source src="assets/wrong.mp3" type="audio/mpeg">
</audio>

</div>

<script>

let currentSlide = 0;

setTimeout(()=>{
nextSlide();
},2000);

function checkAnswer(card,isCorrect){

const tick=document.getElementById("tick");
const cross=document.getElementById("cross");
const nextBtn=document.getElementById("nextBtn");

if(isCorrect){

document.getElementById("correctSound").play();

tick.style.display="block";
tick.style.left="50%";
tick.style.top="50%";
tick.style.transform="translate(-50%,-50%)";

nextBtn.style.display="block";

setTimeout(()=>{
tick.style.display="none";
},1000);

}else{

document.getElementById("wrongSound").play();

cross.style.display="block";
cross.style.left="50%";
cross.style.top="50%";
cross.style.transform="translate(-50%,-50%)";

setTimeout(()=>{
cross.style.display="none";
},1000);
}
}

function nextSlide(){

const slides=document.querySelectorAll(".slide");

slides[currentSlide].classList.remove("active");

currentSlide++;

if(currentSlide>=slides.length){
currentSlide=slides.length-1;
}

slides[currentSlide].classList.add("active");

document.getElementById("nextBtn").style.display="none";

if(currentSlide===6){
createConfetti();
}
}

function createConfetti(){

for(let i=0;i<120;i++){

let conf=document.createElement("div");
conf.classList.add("confetti");

conf.style.left=Math.random()*100+"vw";

conf.style.background=
`hsl(${Math.random()*360},100%,50%)`;

conf.style.animationDuration=
(3+Math.random()*4)+"s";

document.getElementById("slide6").appendChild(conf);
}
}

</script>

</body>
</html>
