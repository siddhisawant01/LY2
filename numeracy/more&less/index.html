<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>More and Less Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial, sans-serif;
}

body{
background:url("https://raw.githubusercontent.com/siddhisawant01/LY2/main/numeracy/more%26less/assets/background.png") center center/cover no-repeat;
}

.slide{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:15px;
}

.slide.active{
display:flex;
}

.logo{
max-width:80%;
max-height:60%;
object-fit:contain;
}

.white-screen{
background:white;
}

.instruction{
font-size:clamp(22px,4vw,40px);
font-weight:bold;
text-align:center;
color:#7a0066;
margin-bottom:20px;
padding:0 10px;
}

.options{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
width:100%;
height:75%;
}

.choice{
width:42%;
max-width:450px;
height:90%;
border:10px solid;
border-radius:25px;
overflow:hidden;
background:white;
cursor:pointer;
transition:.2s;
display:flex;
justify-content:center;
align-items:center;
}

.choice:nth-child(1){
border-color:#ff6b6b;
}

.choice:nth-child(2){
border-color:#4ecdc4;
}

.choice img{
width:100%;
height:100%;
object-fit:contain;
}

.choice:active{
transform:scale(.97);
}

.feedback{
position:absolute;
font-size:120px;
font-weight:bold;
display:none;
z-index:100;
animation:pop .5s ease;
}

.correct{
color:#00c853;
}

.wrong{
color:#ff1744;
}

@keyframes pop{
0%{transform:scale(.2);}
100%{transform:scale(1);}
}

.final-screen{
text-align:center;
}

.final-text{
font-size:clamp(40px,7vw,90px);
font-weight:bold;
color:#ff1493;
text-shadow:3px 3px 0 #fff;
}

.confetti{
position:absolute;
top:-20px;
width:12px;
height:12px;
border-radius:50%;
animation:fall linear infinite;
}

@keyframes fall{
from{
transform:translateY(-10vh) rotate(0deg);
}
to{
transform:translateY(120vh) rotate(720deg);
}
}

@media(max-width:768px){

.options{
gap:10px;
}

.choice{
width:46%;
height:80%;
border-width:6px;
}

.feedback{
font-size:80px;
}
}
</style>
</head>
<body>

<audio id="clap" preload="auto">
<source src="assets/clap.mp3" type="audio/mpeg">
</audio>

<audio id="wrong" preload="auto">
<source src="assets/wrong.mp3" type="audio/mpeg">
</audio>

<div id="tick" class="feedback correct">✔</div>
<div id="cross" class="feedback wrong">✖</div>

<!-- Slide 1 -->
<div class="slide active white-screen" id="slide1">
<img src="assets/innovine-logo.png" class="logo">
</div>

<!-- Slide 2 -->
<div class="slide" id="slide2">
<div class="instruction">Identify the basket having more fruits</div>

<div class="options">
<div class="choice" onclick="checkAnswer(true,3)">
<img src="assets/morefruits.png">
</div>

<div class="choice" onclick="checkAnswer(false)">
<img src="assets/lessfruits.png">
</div>
</div>
</div>

<!-- Slide 3 -->
<div class="slide" id="slide3">
<div class="instruction">Identify the fish tank having less fishes</div>

<div class="options">
<div class="choice" onclick="checkAnswer(true,4)">
<img src="assets/lessfish.png">
</div>

<div class="choice" onclick="checkAnswer(false)">
<img src="assets/morefish.png">
</div>
</div>
</div>

<!-- Slide 4 -->
<div class="slide" id="slide4">
<div class="instruction">Identify the tree having more mangoes</div>

<div class="options">
<div class="choice" onclick="checkAnswer(true,5)">
<img src="assets/moremangoes.png">
</div>

<div class="choice" onclick="checkAnswer(false)">
<img src="assets/lessmangoes.png">
</div>
</div>
</div>

<!-- Slide 5 -->
<div class="slide" id="slide5">
<div class="instruction">Identify the cup having less ice-cream</div>

<div class="options">
<div class="choice" onclick="checkAnswer(true,6)">
<img src="assets/lessicecream.png">
</div>

<div class="choice" onclick="checkAnswer(false)">
<img src="assets/moreicecream.png">
</div>
</div>
</div>

<!-- Slide 6 -->
<div class="slide" id="slide6">
<div class="instruction">Identify the jar having more candies</div>

<div class="options">
<div class="choice" onclick="checkAnswer(true,7)">
<img src="assets/morecandies.png">
</div>

<div class="choice" onclick="checkAnswer(false)">
<img src="assets/lesscandies.png">
</div>
</div>
</div>

<!-- Slide 7 -->
<div class="slide final-screen" id="slide7">
<div class="final-text">Amazing! 🎉</div>
</div>

<script>

let currentSlide = 1;

const slideData = {
2:{
correct:"assets/morefruits.png",
wrong:"assets/lessfruits.png",
next:3
},
3:{
correct:"assets/lessfish.png",
wrong:"assets/morefish.png",
next:4
},
4:{
correct:"assets/moremangoes.png",
wrong:"assets/lessmangoes.png",
next:5
},
5:{
correct:"assets/lessicecream.png",
wrong:"assets/moreicecream.png",
next:6
},
6:{
correct:"assets/morecandies.png",
wrong:"assets/lesscandies.png",
next:7
}
};

function shuffleAnswers(){

Object.keys(slideData).forEach(slideNum=>{

const slide=document.getElementById("slide"+slideNum);
const options=slide.querySelector(".options");

const data=slideData[slideNum];

const correctHTML=
`<div class="choice" onclick="checkAnswer(true,${data.next})">
<img src="${data.correct}">
</div>`;

const wrongHTML=
`<div class="choice" onclick="checkAnswer(false)">
<img src="${data.wrong}">
</div>`;

if(Math.random()<0.5){
options.innerHTML=correctHTML+wrongHTML;
}else{
options.innerHTML=wrongHTML+correctHTML;
}

});

}

shuffleAnswers();

setTimeout(()=>{
showSlide(2);
},2500);

function showSlide(num){

document.querySelectorAll(".slide").forEach(slide=>{
slide.classList.remove("active");
});

document.getElementById("slide"+num).classList.add("active");

if(num===7){
startConfetti();
}
}

function checkAnswer(correct,nextSlide){

if(correct){

document.getElementById("clap").currentTime=0;
document.getElementById("clap").play();

showTick();

setTimeout(()=>{
showSlide(nextSlide);
},1200);

}
else{

document.getElementById("wrong").currentTime=0;
document.getElementById("wrong").play();

showCross();
}
}

function showTick(){

const tick=document.getElementById("tick");

tick.style.display="block";

setTimeout(()=>{
tick.style.display="none";
},900);
}

function showCross(){

const cross=document.getElementById("cross");

cross.style.display="block";

setTimeout(()=>{
cross.style.display="none";
},900);
}

function startConfetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=
`hsl(${Math.random()*360},100%,50%)`;

c.style.animationDuration=
(3+Math.random()*4)+"s";

c.style.animationDelay=
(Math.random()*3)+"s";

document.body.appendChild(c);
}
}

</script>

</body>
</html>
